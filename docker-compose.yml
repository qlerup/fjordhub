services:
  traefik:
    image: traefik:v3.3
    container_name: fjordhub-traefik
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=fjord-net"
      - "--entrypoints.web.address=:80"
      - "--api.dashboard=true"
      - "--api.insecure=true"
    ports:
      - "${TRAEFIK_HTTP_PORT:-80}:80"
      - "${TRAEFIK_DASHBOARD_PORT:-8080}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - fjord-net
    restart: unless-stopped

  fjordhub:
    build: .
    container_name: fjordhub
    ports:
      - "${APP_PORT:-8091}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - "${DATA_DIR:-./data}:/data"
      - "${APPS_DIR:-./apps}:/apps"
    environment:
      DATA_DIR: /data
      TZ: ${TZ:-Europe/Copenhagen}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      # URL to registry.json in FjordHub's GitHub repo (raw content URL)
      REGISTRY_URL: ${REGISTRY_URL:-https://raw.githubusercontent.com/qlerup/fjordhub/main/registry.json}
      APPS_DIR: /apps
      # Paths to each app's docker-compose directory on the host
      FJORDLENS_DIR: ${FJORDLENS_DIR:-}
      FJORDSHARE_DIR: ${FJORDSHARE_DIR:-}
      FJORDPARCEL_DIR: ${FJORDPARCEL_DIR:-}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fjordhub.rule=PathPrefix(`/`)"
      - "traefik.http.routers.fjordhub.priority=1"
      - "traefik.http.services.fjordhub.loadbalancer.server.port=8080"
    networks:
      - fjord-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

networks:
  fjord-net:
    name: fjord-net
    driver: bridge
