<!doctype html>
<html lang="{{ ui_lang|default('da') }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}FjordLens{% endblock %}</title>
  <!-- Icons / PWA manifest -->
  <link rel="icon" href="{{ url_for('static', filename='logos/web/favicon.ico', v=app_build) }}" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='logos/web/favicon-32x32.png', v=app_build) }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='logos/web/favicon-16x16.png', v=app_build) }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='logos/web/apple-touch-icon.png', v=app_build) }}">
  <link rel="manifest" href="{{ url_for('static', filename='logos/web/site.webmanifest', v=app_build) }}">
  <!-- Match browser chrome with theme; supports auto and overrides -->
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f5f6f8">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f1115">
  <meta id="theme-color-override" name="theme-color" content="#0f1115">
  <meta name="application-name" content="FjordLens">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="FjordLens">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="msapplication-TileColor" content="#041A44">
  <meta name="msapplication-config" content="{{ url_for('static', filename='logos/web/browserconfig.xml', v=app_build) }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css', v=app_build) }}">
  {% block head %}{% endblock %}
  <style>/* minimal safe defaults for pages that center a single card */
    .center-screen{display:grid;min-height:100vh;place-items:center;}
    .page-wrap{padding:16px;}
  </style>
  
</head>
<body class="{% block body_class %}{% endblock %}">
  {% block body %}{% endblock %}
  {% block scripts %}{% endblock %}
</body>
</html>
