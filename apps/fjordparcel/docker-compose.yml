services:
  fjordparcel:
    build: .
    container_name: fjordparcel
    env_file:
      - .env
    ports:
      - "8096:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      FJORDPARCEL_UPDATER_URL: http://fjordparcel-updater:8090
      DATA_DIR: /app/data
    volumes:
      - ${DATA_DIR:-./data}:/app/data
    restart: unless-stopped

  fjordparcel-updater:
    build:
      context: .
      dockerfile: updater_service/Dockerfile
    container_name: fjordparcel-updater
    working_dir: /repo
    environment:
      APP_DIR: /repo
      SERVICE_NAME: fjordparcel
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-fjordparcel}
      COMPOSE_SERVICES: "fjordparcel"
      DATA_DIR: ${DATA_DIR:-}
      FJORDPARCEL_UPDATER_STATE_DIR: /state
      FJORDPARCEL_AUTO_UPDATE_CHECK: ${FJORDPARCEL_AUTO_UPDATE_CHECK:-1}
      FJORDPARCEL_AUTO_UPDATE_CHECK_INTERVAL_MINUTES: ${FJORDPARCEL_AUTO_UPDATE_CHECK_INTERVAL_MINUTES:-30}
      TZ: ${TZ:-Europe/Copenhagen}
    volumes:
      - ${APP_REPO_DIR:-.}:/repo
      - ${DATA_DIR:-./data}/updater:/state
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
