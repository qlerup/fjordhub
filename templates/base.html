<!doctype html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}FjordHub{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', filename='logos/web/favicon.ico') }}" sizes="any">
  <link rel="icon" href="{{ url_for('static', filename='logos/web/favicon-32x32.png') }}" type="image/png" sizes="32x32">
  <link rel="icon" href="{{ url_for('static', filename='logos/web/favicon-16x16.png') }}" type="image/png" sizes="16x16">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='logos/web/apple-touch-icon.png') }}">
  <meta name="theme-color" content="#0f1115">
  <meta name="application-name" content="FjordHub">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FjordHub">
  <meta name="msapplication-TileImage" content="{{ url_for('static', filename='logos/web/mstile-150x150.png') }}">
  <meta name="msapplication-TileColor" content="#0f1115">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  {% block head %}{% endblock %}
</head>
<body>
  <header class="topbar">
    <a href="{{ url_for('dashboard') }}" class="topbar-brand">
      <img src="{{ url_for('static', filename='logos/logos/fjordhub-logo-horizontal-transparent.png') }}" alt="FjordHub" class="brand-logo">
    </a>
    <nav class="topbar-nav">
      {% block topbar_right %}{% endblock %}
    </nav>
  </header>

  <div class="app-body">
    <nav class="sidebar">
      <div class="sidebar-top">
        <a href="{{ url_for('dashboard') }}" class="sidebar-item{% if active_page == 'apps' %} active{% endif %}" title="Apps">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
        </a>
        <a href="{{ url_for('settings') }}" class="sidebar-item{% if active_page == 'settings' %} active{% endif %}" title="Indstillinger">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </a>
      </div>
      <div class="sidebar-bottom">
        <a href="{{ url_for('profile') }}" class="sidebar-item{% if active_page == 'profile' %} active{% endif %}" title="Bruger">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </a>
      </div>
    </nav>

    <main class="page-content">
      {% block content %}{% endblock %}
    </main>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
