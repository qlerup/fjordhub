{% extends "base_auth.html" %}
{% block title %}Log ind — FjordHub{% endblock %}
{% block content %}
<div class="auth-card">
  <img class="auth-logo" src="{{ url_for('static', filename='logos/logos/fjordhub-logo-horizontal-transparent.png') }}" alt="FjordHub">
  <h1>Log ind</h1>
  <p class="auth-subtitle">Adgang kræver login.</p>

  {% if error %}
    <div class="auth-error">{{ error }}</div>
  {% endif %}
  {% if created %}
    <div class="auth-ok">Konto oprettet. Log ind herunder.</div>
  {% endif %}

  <form method="post" autocomplete="off">
    <div class="auth-field">
      <label for="username">Brugernavn</label>
      <input id="username" name="username" type="text" autocomplete="username" required>
    </div>
    <div class="auth-field">
      <label for="password">Adgangskode</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="auth-btn">Log ind</button>
  </form>
</div>
{% endblock %}
