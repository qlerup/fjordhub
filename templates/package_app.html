{% extends "base.html" %}
{% block title %}{{ package.name }} — FjordHub{% endblock %}
{% block head %}<link rel="stylesheet" href="{{ url_for('package_asset', package_id=package.id, filename='styles.css', v=package.version) }}">{% endblock %}
{% block content %}
<div class="builtin-app" data-package="{{ package.id }}">
  <div class="builtin-toolbar">
    <div><a href="{{ url_for('packages') }}" class="builtin-back">← Mine apps</a><h1>{{ package.name }}</h1></div>
    <span class="package-badge">Installeret</span>
  </div>
  {{ package_body|safe }}
</div>
{% endblock %}
{% block scripts %}<script src="{{ url_for('package_asset', package_id=package.id, filename='app.js', v=package.version) }}"></script>{% endblock %}
